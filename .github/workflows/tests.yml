name: Backend tests

# Se déclenche sur chaque Pull Request visant main, et sur chaque push
# vers main lui-même (utile une fois qu'une PR est mergée).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Récupère le code
        uses: actions/checkout@v4

      - name: Installe Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installe les dépendances (sans psycopg2 — tests via SQLite)
        working-directory: backend
        run: pip install -r requirements-test.txt

      - name: Lance les tests
        working-directory: backend
        run: python -m pytest tests/ -v
